<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C896"/>
      <stop offset="100%" style="stop-color:#00A87E"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Coin circle -->
  <circle cx="256" cy="230" r="130" fill="url(#coin)" opacity="0.95"/>
  <circle cx="256" cy="230" r="105" fill="#FFB300" opacity="0.6"/>
  <!-- Rp symbol -->
  <text x="256" y="275" font-family="Arial Black, sans-serif" font-size="145" font-weight="900"
    text-anchor="middle" fill="#7A4500" opacity="0.85">Rp</text>
  <!-- Chart bars at bottom -->
  <rect x="110" y="395" width="55" height="70" rx="12" fill="white" opacity="0.3"/>
  <rect x="185" y="360" width="55" height="105" rx="12" fill="white" opacity="0.5"/>
  <rect x="260" y="375" width="55" height="90" rx="12" fill="white" opacity="0.4"/>
  <rect x="335" y="340" width="55" height="125" rx="12" fill="white" opacity="0.6"/>
</svg>
