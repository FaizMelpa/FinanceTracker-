name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📥 Install dependencies
        run: npm install

      - name: 🏗️ Build web app
        run: npm run build

      - name: 🤖 Add Android platform
        run: |
          npm install -g @capacitor/cli
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: 📝 Inject Storage Permissions into AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>\n    <application|g' "$MANIFEST"
          echo "Permissions injected"

      - name: 🎨 Override App Icons
        run: python3 gen_icons.py

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔑 Make gradlew executable
        run: chmod +x android/gradlew

      - name: 🏗️ Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Finance-Tracker-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🎉 Build Success
        run: echo "APK berhasil dibuild!"
